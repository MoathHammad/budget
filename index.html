<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دفتر الميزانية</title>
<style>body{background:#08090e;color:#f0ece4;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}</style>
</head>
<body>
<div>جاري التحميل...</div>
<script>
(async function(){
  try {
    localStorage.setItem('fb_uid', JSON.stringify('u_1777852421371_a6muud'));
    Object.keys(localStorage).forEach(function(k){
      if(k.indexOf('bex_')===0||k.indexOf('binc_')===0||k.indexOf('bsav_')===0){
        try{
          var p=JSON.parse(localStorage.getItem(k));
          if(p&&typeof p==='object'&&!Array.isArray(p)&&Array.isArray(p.data)){
            localStorage.setItem(k, JSON.stringify(p.data));
          }
        }catch(e){}
      }
    });
    const r = await fetch('./app.html?v=' + Date.now());
    let html = await r.text();
    const patch = '<scr'+'ipt>(function(){var orig=localStorage.setItem.bind(localStorage);localStorage.setItem=function(k,v){if(k&&(k.indexOf("bex_")===0||k.indexOf("binc_")===0||k.indexOf("bsav_")===0)){try{var p=JSON.parse(v);if(p&&typeof p==="object"&&!Array.isArray(p)&&Array.isArray(p.data)){v=JSON.stringify(p.data);}}catch(e){}}return orig(k,v);};})();</scr'+'ipt>';
    html = html.replace('<head>', '<head>' + patch);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    window.location.href = './app.html';
  }
})();
</script>
</body>
</html>
